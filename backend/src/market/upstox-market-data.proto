syntax = "proto3";

package com.upstox.marketdata.model.v3;

message FeedRequest {
    string guid = 1;
    string method = 2;
    FeedRequestData data = 3;
}

message FeedRequestData {
    string mode = 1;
    repeated string instrumentKeys = 2;
}

message MarketDataFeed {
    map<string, MarketData> data = 1;
}

message MarketData {
    LTPC ltpc = 1;
    MarketFullDetails full_details = 2;
    OptionGreeks option_greeks = 3;
    ExtendedFeed extended_feed = 4;
}

message LTPC {
    double last_price = 1;
    int64 last_time = 2;
    double last_quantity = 3;
    double cp = 4;
}

message MarketFullDetails {
    double last_price = 1;
    int64 last_time = 2;
    double last_quantity = 3;
    double cp = 4;
    int64 oi = 5;
    int64 oich = 6;
}

message OptionGreeks {
    double delta = 1;
    double theta = 2;
    double gamma = 3;
    double vega = 4;
    double iv = 5;
}

message ExtendedFeed {
    double last_price = 1;
    int64 oi = 2;
    int64 oich = 3;
}
